services:
  # Frontend Static Site (Vite)
  - type: static_site
    name: appraisal-frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    headers:
      - path: /*
        headers:
          - key: Cache-Control
            value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_SUPABASE_ENCRYPTION_KEY
        sync: false
      - key: VITE_MSAL_CLIENT_ID
        sync: false
      - key: VITE_MSAL_TENANT_ID
        sync: false
      - key: VITE_API_URL
        sync: false

  # Backend Web Service (Node.js Email Server)
  - type: web
    name: appraisal-email-backend
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
